version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: datamind_postgres
    environment:
      POSTGRES_USER: datamind_user
      POSTGRES_PASSWORD: datamind_password
      POSTGRES_DB: datamind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - datamind_network
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: datamind_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: datamind_admin
      MONGO_INITDB_ROOT_PASSWORD: datamind_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - datamind_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: datamind_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datamind_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: datamind_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_SERVER=postgres
      - MONGO_SERVER=mongodb
      - REDIS_SERVER=redis
    networks:
      - datamind_network
    depends_on:
      - postgres
      - mongodb
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: datamind_frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - datamind_network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  datamind_network:
    driver: bridge
